name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: k9t-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: k9t-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: k9t-macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: k9t-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.artifact }}.tar.gz k9t
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/${{ matrix.target }}/release/${{ matrix.artifact }}.tar.gz
            target/${{ matrix.target }}/release/${{ matrix.artifact }}.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksum file
        run: |
          cat artifacts/*.sha256 > checksums.txt
          sort -o checksums.txt checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            checksums.txt

      - name: Set version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract SHA256 checksums
        id: checksums
        run: |
          AMD64_SHA=$(awk '{print $1}' artifacts/k9t-macos-amd64.tar.gz.sha256)
          ARM64_SHA=$(awk '{print $1}' artifacts/k9t-macos-arm64.tar.gz.sha256)
          LINUX_AMD64_SHA=$(awk '{print $1}' artifacts/k9t-linux-amd64.tar.gz.sha256)
          LINUX_ARM64_SHA=$(awk '{print $1}' artifacts/k9t-linux-arm64.tar.gz.sha256)
          echo "macos-amd64=$AMD64_SHA" >> "$GITHUB_OUTPUT"
          echo "macos-arm64=$ARM64_SHA" >> "$GITHUB_OUTPUT"
          echo "linux-amd64=$LINUX_AMD64_SHA" >> "$GITHUB_OUTPUT"
          echo "linux-arm64=$LINUX_ARM64_SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          MACOS_AMD64_SHA: ${{ steps.checksums.outputs.macos-amd64 }}
          MACOS_ARM64_SHA: ${{ steps.checksums.outputs.macos-arm64 }}
          LINUX_AMD64_SHA: ${{ steps.checksums.outputs.linux-amd64 }}
          LINUX_ARM64_SHA: ${{ steps.checksums.outputs.linux-arm64 }}
          TAP_REPO: helloworldsg/homebrew-tap
          HOMEBREW_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${HOMEBREW_GITHUB_TOKEN}@github.com/${TAP_REPO}.git tap-repo
          mkdir -p tap-repo/Formula
          FORMULA_TEMPLATE='class K9t < Formula
            desc "Terminal UI for Kubernetes"
            homepage "https://github.com/helloworldsg/k9t"
            version "K9T_VERSION"
            license "MIT"

            depends_on "jq"
            depends_on "bat"
            depends_on "hl"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/helloworldsg/k9t/releases/download/vK9T_VERSION/k9t-macos-amd64.tar.gz"
                sha256 "MACOS_AMD64_SHA"
              else
                url "https://github.com/helloworldsg/k9t/releases/download/vK9T_VERSION/k9t-macos-arm64.tar.gz"
                sha256 "MACOS_ARM64_SHA"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/helloworldsg/k9t/releases/download/vK9T_VERSION/k9t-linux-amd64.tar.gz"
                sha256 "LINUX_AMD64_SHA"
              else
                url "https://github.com/helloworldsg/k9t/releases/download/vK9T_VERSION/k9t-linux-arm64.tar.gz"
                sha256 "LINUX_ARM64_SHA"
              end
            end

            def install
              bin.install "k9t"
            end

            test do
              system "#{bin}/k9t", "--version"
            end
          end'
          echo "$FORMULA_TEMPLATE" \
            | sed "s/K9T_VERSION/${VERSION}/g" \
            | sed "s/MACOS_AMD64_SHA/${MACOS_AMD64_SHA}/g" \
            | sed "s/MACOS_ARM64_SHA/${MACOS_ARM64_SHA}/g" \
            | sed "s/LINUX_AMD64_SHA/${LINUX_AMD64_SHA}/g" \
            | sed "s/LINUX_ARM64_SHA/${LINUX_ARM64_SHA}/g" \
            > tap-repo/Formula/k9t.rb
          git -C tap-repo config user.name "github-actions[bot]"
          git -C tap-repo config user.email "github-actions[bot]@users.noreply.github.com"
          git -C tap-repo add Formula/k9t.rb
          git -C tap-repo commit -m "k9t ${VERSION}" || true
          git -C tap-repo push