# k9t configuration (~/.config/k9t.yaml)
# Customize theme, filters, and command templates

# Theme: tokyo_night, nord, gruvbox_dark, monokai, one_dark, solarized_dark
theme: tokyo_night

# Default namespace (empty = all namespaces)
namespace: ""

# Show wide columns with resource info
wide_pod_columns: false

# Borderless table style
borderless: true

# Namespace/pod regex filters (matched as "namespace/pod_regex")
# filters:
#   - "prod/api-.*"
#   - "staging/.*"

# Commands — built-ins can be overridden, add custom commands as needed
# All commands are defined in a single map. Command name is the key.
# Built-in commands: logs, previous_logs, shell, describe, yaml, set_image,
#                   port_forward, debug, view_volumes, view_configmaps,
#                   view_secrets, view_events, view_routes, view_netpol
